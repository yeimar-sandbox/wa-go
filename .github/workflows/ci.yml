name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./app/... ./bootstrap/... ./config/... ./routes/...

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    # Lint is advisory for now — surfaces issues without blocking merges until
    # the codebase is fully cleaned. Flip `continue-on-error` to false once green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          args: ./app/... ./bootstrap/... ./config/... ./routes/...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test -race -count=1 -timeout 5m ./tests/unit/...

  smoke:
    name: Smoke Test (Newman)
    runs-on: ubuntu-latest
    needs: [vet, test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wa
          POSTGRES_PASSWORD: wa
          POSTGRES_DB: wa_go
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wa -d wa_go"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Build server
        run: go build -o wa-go .

      - name: Create .env for smoke run
        run: |
          cat > .env <<'EOF'
          APP_NAME=wa-go
          APP_ENV=local
          APP_KEY=base64:c21va2VfdGVzdF9rZXlfMzJfYnl0ZXNfcGFkX18=
          APP_DEBUG=false
          APP_HOST=127.0.0.1
          APP_PORT=3000

          DB_CONNECTION=postgres
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=wa_go
          DB_USERNAME=wa
          DB_PASSWORD=wa

          WA_GLOBAL_API_KEY=smoke-admin-key
          WA_AUTH_DATABASE_URL=postgres://wa:wa@127.0.0.1:5432/wa_go?sslmode=disable
          WA_CONNECT_ON_STARTUP=false
          WA_CHECK_USER_EXISTS=false
          WA_SAVE_MESSAGES=false
          WA_DEBUG=WARN
          EOF

      - name: Start server
        run: |
          ./wa-go > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/v1/health >/dev/null; then
              echo "server is up"
              exit 0
            fi
            sleep 1
          done
          echo "server did not become healthy in time. Last 50 log lines:"
          tail -n 50 server.log || true
          exit 1

      - name: Run Newman smoke (Health folder)
        run: |
          newman run docs/wa-go-api.postman_collection.json \
            --folder Health \
            --env-var baseUrl=http://127.0.0.1:3000/api/v1 \
            --reporters cli \
            --bail

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" 2>/dev/null || true
          fi

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
